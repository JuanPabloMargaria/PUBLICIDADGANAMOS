  <!-- Script de WhatsApp Mejorado -->
  <script>
    // Configuración de WhatsApp
    const WHATSAPP_CONFIG = {
      phoneNumber: '5493562592301', // Tu número actual
      defaultMessage: 'Hola, quiero crear mí usuario 🙌'
    };

    // Función para abrir WhatsApp con tracking
    function openWhatsAppWithTracking(message = WHATSAPP_CONFIG.defaultMessage) {
      // Tracking del evento para Facebook Pixel
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Contact', {
          content_name: 'WhatsApp Click',
          content_category: 'Lead Generation'
        });
      }

      // Detectar si es dispositivo móvil
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const encodedMessage = encodeURIComponent(message);
      
      if (isMobile) {
        // En móvil: intenta abrir la app directamente
        window.location.href = `whatsapp://send?phone=${WHATSAPP_CONFIG.phoneNumber}&text=${encodedMessage}`;
        
        // Fallback a wa.me después de 1 segundo si la app no se abre
        setTimeout(() => {
          window.open(`https://wa.me/${WHATSAPP_CONFIG.phoneNumber}?text=${encodedMessage}`, '_blank');
        }, 1000);
      } else {
        // En desktop: abre WhatsApp Web
        window.open(`https://web.whatsapp.com/send?phone=${WHATSAPP_CONFIG.phoneNumber}&text=${encodedMessage}`, '_blank');
      }

      // Log para analytics (opcional)
      console.log('WhatsApp contact initiated');
    }

    // Event listener para el botón de WhatsApp
    document.addEventListener('DOMContentLoaded', function() {
      const whatsappButton = document.querySelector('.boton-whatsapp');
      
      if (whatsappButton) {
        whatsappButton.addEventListener('click', function(e) {
          e.preventDefault(); // Prevenir el comportamiento por defecto
          openWhatsAppWithTracking();
        });
      }

      // Agregar tracking a todos los enlaces de WhatsApp en la página
      const allWhatsappLinks = document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"]');
      allWhatsappLinks.forEach(link => {
        link.addEventListener('click', function() {
          if (typeof fbq !== 'undefined') {
            fbq('track', 'Contact');
          }
        });
      });
    });

    // Función adicional por si quieres llamarla desde otro lado
    function contactarWhatsApp(mensajePersonalizado) {
      openWhatsAppWithTracking(mensajePersonalizado || WHATSAPP_CONFIG.defaultMessage);
    }

    // Auto-redirect después de 3 segundos (ACTIVADO)
    setTimeout(() => {
      const userInteracted = sessionStorage.getItem('user_interacted');
      if (!userInteracted) {
        openWhatsAppWithTracking('Hola, quiero crear mí usuario 🙌');
      }
    }, 3000); // 3 segundos

    // Marcar que el usuario interactuó
    document.addEventListener('click', () => {
      sessionStorage.setItem('user_interacted', 'true');
    });
  </script>
